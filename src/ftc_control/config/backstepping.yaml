# Backstepping Controller Configuration

/**:
  ros__parameters:
    controller:
      type: "backstepping"

      # Control Gains
      gains:
        # K1: Virtual control gain (position error -> velocity command)
        # [surge, sway, heave, roll, pitch, yaw]
        K1: [100, 100, 100, 100, 100, 100]

        # K2: Feedback gain (velocity error -> force/torque)
        K2: [10.0, 10.0, 10.0, 10.0, 10.0, 10.0]

      # Saturation limits based on BlueROV2 Heavy thruster capacity
      limits:
        max_force: [120.0, 120.0, 120.0]    # Newtons [surge, sway, heave]
        max_torque: [30.0, 30.0, 30.0]      # Nm [roll, pitch, yaw]

      # Vehicle parameters (reference — built into AUVDynamics model class)
      vehicle:
        mass: 11.5  # kg
        # SNAME notation: [Xu̇, Yv̇, Zẇ, Kṗ, Mq̇, Nṙ]
        added_mass: [5.5, 12.7, 14.6, 0.12, 0.12, 0.12]
        # [Xu|u|, Yv|v|, Zw|w|, Kp|p|, Mq|q|, Nr|r|]
        quadratic_damping: [18.2, 21.7, 36.8, 1.5, 1.5, 1.5]
        # [Xu, Yv, Zw, Kp, Mq, Nr]
        linear_damping: [4.0, 6.2, 5.2, 0.07, 0.07, 0.07]
